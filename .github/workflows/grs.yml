name: Update README cards

on:
  schedule:
  - cron: "0 3 */14 * *"
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Generate stats card 1
        uses: readme-tools/github-readme-stats-action@v1
        with:
          card: stats
          options: username=${{ github.repository_owner }}&show_icons=true&theme=nord&locale=en&count_private=true&show=issues&bg_color=.75,1d1420,091030&custom_title=JBros%20Development%27s%20Stats&rank_icon=github
          path: profile/stats1.svg
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate stats card 2
        uses: readme-tools/github-readme-stats-action@v1
        with:
          card: top-langs
          options: username=${{ github.repository_owner }}&layout=compact&theme=nord&bg_color=.75,091030,1d1420
          path: profile/stats2.svg
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Commit cards
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@users.noreply.github.com"
          git add profile/*.svg
          git commit -m "Update README cards" || exit 0
          git push
